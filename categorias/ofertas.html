<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ofertas – Trade Farma</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fa;
    }

    h1 {
      text-align: center;
      margin: 20px 0;
    }

    /* ===== CAROUSEL ===== */
    .carousel {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding: 20px;
      scroll-snap-type: x mandatory;
    }

    .carousel::-webkit-scrollbar {
      display: none;
    }

    .card {
      min-width: 260px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.15);
      scroll-snap-align: center;
      overflow: hidden;
      position: relative;
    }

    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: #ff6a00;
      color: white;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: bold;
      border-radius: 6px;
    }

    .card img {
      width: 100%;
      display: block;
    }

    .card-content {
      padding: 14px;
      text-align: center;
    }

    .card-content h3 {
      font-size: 15px;
      margin: 8px 0;
    }

    .price {
      color: #ff6a00;
      font-size: 18px;
      font-weight: bold;
    }

    /* ===== PDF BUTTON ===== */
    .pdf-box {
      text-align: center;
      margin: 30px 20px;
    }

    .pdf-btn {
      display: inline-block;
      background: #0b2a6f;
      color: white;
      padding: 14px 22px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      font-size: 15px;
    }

    .pdf-btn:hover {
      background: #081f52;
    }
          .back {
  display: inline-block;
  margin: 12px;
  padding: 8px 14px;
  background: #0b2a6f;
  color: white;
  text-decoration: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: bold;
}
.back:hover {
  background: #143c9c;
}
.card-link {
  text-decoration: none;
  color: inherit;
}

  </style>
</head>
<a href="/index.html" class="back">← Volver al catálogo</a>

    </div>
  </div>

</a>


  <a class="card-link"

   target="_blank">

  <div class="card">
    <span class="badge">NUEVO</span>
    <img src="./img_ofertas/nuevo2.png" alt="Rhinal Nafazolina">
    <div class="card-content">
      <h3>Vaselina liquida<br>IBC</h3>
    </div>
  </div>

</a>


  <a class="card-link"
   href="https://www.tradefarma.com.ar/"
   target="_blank">

  <div class="card">
    <span class="badge">NUEVO</span>
    <img src="./img_ofertas/nuevo3.png" alt="Repelente 911">
    <div class="card-content">
      <h3>Agua oxigenada e Iodopovidona<br>IBC</h3>

<div class="pdf-box">

    📄 Descargar ofertas completas (PDF)

</body>
</html>
